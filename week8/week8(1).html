<!DOCTYPE html>
<html>
    <head>
        <style>
            .Square {
            width: 100px;
            height: 100px;
            background-color:darkmagenta;
            margin: auto;
            animation: Square 2s linear infinite ;
            }
        @keyframes Square {
           from {
            transform: rotate(0deg);
            }
           to {
            transform: rotate(360deg);
            }
         }
        </style>
    </head>
    <body style="background-image: url(https://i.pinimg.com/1200x/a0/7f/45/a07f45a23bbb9bcca7cc010065b9bafd.jpg); background-size: cover;">
        <h1 style="font-family: 'Times New Roman', Times, serif;font-style: oblique;color: mediumvioletred;text-align: center;text-decoration: underline;">A Square that Continuously rotates using CSS Animation</h1>
        <p style="font-size: x-large; text-align: center; font-style: italic;"> Watch the square spins endlessly with smooth animation</p>
        <p style="font-size: x-large; text-align: center; font-style: italic;"> It demonsrtrates how we can create the smooth motion effects on webpage</p>
        <div class="Square"></div>
    </body>
</html>
