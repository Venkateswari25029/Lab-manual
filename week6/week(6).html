<!DOCTYPE html>
<html>
<head>
    <style>
        body{
            margin: 0;
            font-family: 'Times New Roman', Times, serif;
            background-image: url(https://i.pinimg.com/1200x/56/3c/5c/563c5c65b45a12b09e8a9881627c68e1.jpg);
        }
        .container{
            display: grid;
            grid-template-rows: auto auto 400px auto;
            grid-template-columns: 200px auto;
            grid-template-areas: 
            "header header"
            "sales sales"
            "sidebar products"
            "footer footer";
            gap: 10px;
            padding: 10px;
        }
        .header{
           grid-area: header;
           background-color: bisque;
           color: brown; 
           
           padding: 20px;
           font-size: large;
           font-style: italic;
           text-align: center;
        }
        .sales{
            grid-area: sales;
            background-color: cadetblue;
            text-align: center;
            padding: 5px;
            font-size: medium;
            font-style: italic;
            font-family: 'Times New Roman', Times, serif;
            
        }
        .sidebar{
            background-color: pink;
            grid-area: sidebar;
            padding: 15px;
            text-align: center;
            font-style: italic;
        }
        

        .footer{
            background-color: darkgray;
            grid-area: footer;
            font-size: larger;
            padding: 5px;
            display:grid;
            text-align: center;
        }
        .products{
    width: 100%;
    height: 400px;
    border: 2px solid black;
    float: center;
    background-size: cover;
    display:grid;
    border: none;
   
}
      .card {
      border: 1px solid #ccc;
      padding: 10px;
      text-align: center;
      background: #fff;
    }
    .card img {
      width: 100px;
      height: 150px;
      object-fit: cover;
    }  

    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h2>**Shopping Hub**</h2>
        </div>
        <div class="sales">
            <p>Sales Flat 50% OFF -By shopping hub</p>
            <img src="https://i.pinimg.com/1200x/81/7d/d0/817dd016bfa02f6f966b1e253e6a6c4c.jpg" alt="sales" align="left" width="80px">
        </div>
         <div class="sidebar">
                <h2>Categories</h2>
                <a href="products.html" target="name">electronics</a><br>
                <a href="cloths.html" target="name">Clothing</a><br>
                <a href="appliances.html" target="name">Home Appliances</a><br>
                <a href="books.html" target="name">Books</a><br>
            
         </div>
         <div class="products">
            <iframe src="products.html" name="name"></iframe>
         </div>   

    <div class="footer">
        <p>All Copy Rights Reserved</p>
    </div>
    </div>
</body>
</html>
