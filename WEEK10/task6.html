<!DOCTYPE html>
<html>
<head>
  <title>Student Grade Calculator</title>
</head>
<body>
  <h2>Enter Marks for 6 Subjects</h2>
  
  <input id="sub1" type="number" placeholder="Subject 1"><br>
  <input id="sub2" type="number" placeholder="Subject 2"><br>
  <input id="sub3" type="number" placeholder="Subject 3"><br>
  <input id="sub4" type="number" placeholder="Subject 4"><br>
  <input id="sub5" type="number" placeholder="Subject 5"><br>
  <input id="sub6" type="number" placeholder="Subject 6"><br><br>
  
  <button onclick="calculateGrade()">Compute Grade</button>
  
  <p id="result"></p>
  
  <script>
    function calculateGrade() {
      let m1 = parseInt(document.getElementById("sub1").value);
      let m2 = parseInt(document.getElementById("sub2").value);
      let m3 = parseInt(document.getElementById("sub3").value);
      let m4 = parseInt(document.getElementById("sub4").value);
      let m5 = parseInt(document.getElementById("sub5").value);
      let m6 = parseInt(document.getElementById("sub6").value);
      let average = (m1 + m2 + m3 + m4 + m5 + m6) / 6;
      let grade;
      if (average >= 90) {
        grade = "A";
      } else if (average >= 80) {
        grade = "B";
      } else if (average >= 70) {
        grade = "C";
      } else if (average >= 60) {
        grade = "D";
      } else {
        grade = "F";
      }
      document.getElementById("result").innerHTML =
        "Average Marks: " + average + "<br>Grade: " + grade;
    }
  </script>
</body>
</html>
