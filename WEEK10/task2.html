<!DOCTYPE html>
<html>
<head>
    <title>Sort Three Numbers</title>
</head>
<body>
    <h2>Sort Three Numbers</h2>
    
    <p>Enter first number:<input type="number" id="num1"></p>
    <p>Enter second number:<input type="number" id="num2"></p>
    <p>Enter third number:<input type="number" id="num3"></p>
    <button onclick="sortNumbers()">Sort</button>
    
    <p id="result"></p>
    
    <script>
        function sortNumbers() {
            let a = parseFloat(document.getElementById("num1").value);
            let b = parseFloat(document.getElementById("num2").value);
            let c = parseFloat(document.getElementById("num3").value);
            let arr = [a, b, c];
            arr.sort(function(x, y) {
                return x - y; 
            });
            
                alert("Sorted order: " + arr.join(", "));
        }
    </script>
</body>
</html>
