<!DOCTYPE html>
<html>
<head>
    <title>Find Largest of 5 Numbers</title>
    <script>
        function findLargest() {
            let a = parseFloat(document.getElementById("num1").value);
            let b = parseFloat(document.getElementById("num2").value);
            let c = parseFloat(document.getElementById("num3").value);
            let d = parseFloat(document.getElementById("num4").value);
            let e = parseFloat(document.getElementById("num5").value);

            let largest = Math.max(a, b, c, d, e);

            
                alert("Largest number is: " + largest);
        }
    </script>
</head>
<body>

<h2>Find Largest of 5 Numbers</h2>

<input type="text" id="num1" placeholder="Number 1"><br><br>
<input type="text" id="num2" placeholder="Number 2"><br><br>
<input type="text" id="num3" placeholder="Number 3"><br><br>
<input type="text" id="num4" placeholder="Number 4"><br><br>
<input type="text" id="num5" placeholder="Number 5"><br><br>

<button onclick="findLargest()">Find Largest</button>

<p id="result"></p>

</body>
</html>
