<!DOCTYPE html>
<html>
<body>
    <h2>Checking the number is even or odd.</h2>
    <p id="output"></p>
    <script>
       for(let num=0;num<=15;num++){
            if(num%2==0){
                document.write(num +" is an  even number. <br>");
            }
            else{
                document.write(num + " is odd number. <br>");
            }
       }
       document.getElementById("output"); 
    </script>
</body>
</html>
