<!DOCTYPE html>
<html>
<head>
  <title>Sign of Product</title>
</head>
<body>
  <h2>Find the Sign of Product of Three Numbers</h2>
  <label>Enter first number:</label>
  <input type="number" id="num1"><br><br>

  <label>Enter second number:</label>
  <input type="number" id="num2"><br><br>

  <label>Enter third number:</label>
  <input type="number" id="num3"><br><br>
  <button onclick="checkSign()">Check Sign</button>

  <script>

    function checkSign() {
      let a = parseFloat(document.getElementById("num1").value);
      let b = parseFloat(document.getElementById("num2").value);
      let c = parseFloat(document.getElementById("num3").value);

      let product = a * b * c;
      if (product > 0) {
        alert("The sign of the product is Positive (+)");
      } else if (product < 0) {
        alert("The sign of the product is Negative (-)");
      } else {
        alert("The product is Zero (0)");
      }
    }
  </script>
</body>
</html>
